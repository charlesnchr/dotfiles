[mode.main.binding]

# App toggle (via Karabiner opt+letter → cmd-alt-ctrl-number proxy)
# opt+a → 1, opt+s → 2, opt+d → 3, opt+f → 4, opt+g → 5, opt+y → 6
# opt+u → 7, opt+i → 8, opt+o → 9, opt+e → 0, opt+w → w
cmd-alt-ctrl-1 = 'exec-and-forget toggle-app Ghostty'
cmd-alt-ctrl-2 = 'exec-and-forget toggle-app "Google Chrome"'
cmd-alt-ctrl-3 = 'exec-and-forget toggle-app Mattermost'
cmd-alt-ctrl-4 = 'exec-and-forget toggle-app Spotify'
cmd-alt-ctrl-5 = 'exec-and-forget toggle-app Slack'
cmd-alt-ctrl-shift-5 = 'exec-and-forget toggle-app "Microsoft Teams"'
cmd-alt-ctrl-9 = 'exec-and-forget toggle-app Notion'
cmd-alt-ctrl-w = 'exec-and-forget toggle-app WhatsApp'

alt-enter = 'exec-and-forget open -na "Ghostty.app"'
alt-shift-enter = 'exec-and-forget open -na "Google Chrome.app"'
alt-q = 'close'
alt-m = 'macos-native-minimize'
alt-semicolon = 'fullscreen'
alt-shift-space = 'layout floating tiling'

alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

alt-ctrl-h = 'focus-monitor left'
alt-ctrl-l = 'focus-monitor right'
alt-ctrl-shift-h = 'move-node-to-monitor --wrap-around left'
alt-ctrl-shift-l = 'move-node-to-monitor --wrap-around right'

# alt-w = 'workspace-back-and-forth'
# alt-n = 'workspace --wrap-around next'
# alt-p = 'workspace --wrap-around prev'

alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
alt-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
alt-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
alt-shift-7 = ['move-node-to-workspace 7', 'workspace 7']
alt-shift-8 = ['move-node-to-workspace 8', 'workspace 8']
alt-shift-9 = ['move-node-to-workspace 9', 'workspace 9']

alt-tab = 'workspace-back-and-forth'

# Layout / tiling (DISABLED while in floating-only mode)
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-b = 'balance-sizes'
alt-r = 'mode resize'

cmd-alt-ctrl-0 = 'mode launch'
alt-shift-semicolon = 'mode service'

[mode.resize.binding]
h = 'resize width -80'
j = 'resize height +80'
k = 'resize height -80'
l = 'resize width +80'

minus = 'resize smart -50'
equal = 'resize smart +50'

enter = 'mode main'
esc = 'mode main'

[mode.launch.binding]
g = ['exec-and-forget launch-chat "https://gemini.google.com"', 'mode main']
c = ['exec-and-forget launch-chat "https://chat.com"', 'mode main']
a = ['exec-and-forget launch-chat "https://claude.ai"', 'mode main']
enter = 'mode main'
esc = 'mode main'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
b = ['balance-sizes', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
h = ['join-with left', 'mode main']
j = ['join-with down', 'mode main']
k = ['join-with up', 'mode main']
l = ['join-with right', 'mode main']
enter = 'mode main'
