start-at-login = true
config-version = 2

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
accordion-padding = 24

[exec]
inherit-env-vars = true

[exec.env-vars]
PATH = '${HOME}/bin:/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:${PATH}'

[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 10
outer.bottom = 10
outer.top = 10
outer.right = 10

[key-mapping]
preset = 'qwerty'

# Workspaces 2-5 tile (default), the rest float
[[on-window-detected]]
if.workspace = '1'
check-further-callbacks = true
run = 'layout floating'

[[on-window-detected]]
if.workspace = '6'
check-further-callbacks = true
run = 'layout floating'

[[on-window-detected]]
if.workspace = '7'
check-further-callbacks = true
run = 'layout floating'

[[on-window-detected]]
if.workspace = '8'
check-further-callbacks = true
run = 'layout floating'

[[on-window-detected]]
if.workspace = '9'
check-further-callbacks = true
run = 'layout floating'

